[DEFAULTS]
# Define default threshold values for the different the different stages during
# cooldown and warmup procedures
still_full_cd = 5 # still temperature at which the program sends a notification during full cooldown (usually before condensing)
still_4K_cd = 7 # still temperature at which the program sends a notification during cooldown to 4K
still_coldinsert = 4 # still temperature at which the program sends a notification during FSE cold insert
baseT = 0.01 # MXC base temperature at which the program sends a notification during cooldown
circ_warning = 0.1 # MXC temperature threshold above which the program sends a warning in circulation mode
warmup = 290 # still temperature at which the program sends a notification during warmup
PT_start = 290 # 50K stage temperature threshold to detect that the PT has been started

# Define channel numbers of the temperature sensors (keep empty if not available)
channel_nr_still = 5
channel_nr_mxc = 6
channel_nr_magnet = 
channel_nr_fse = 

# Define the day time in hh:mm format at which the program is to take a snapshot of the readings in circulation mode
snapshot_time = 06:00


[LOGGING]
# Define the path where the Bluefors log files are located
input_logfile_path = C:/Users/hqclabo/Desktop/01491.150


[PROGRAM_MODES]
# Define the available program modes and their order
available_modes = 
	Full Cooldown
        Cooldown to 4K
        Warmup
        Condensing
        FSE Cold Insert
        FSE Cold Insert 4K
        FSE Warmup
        Circulation Mode
	Reading Snapshot


[MQTT]
# Define hostname (IP address of BFTC API), port and topic to subscribe to
hostname = 192.168.10.54
port = 1883
topic = channel/measurement/listen


[DISCORD]
# Define target channel and enter access token of the user
# See readme for instructions on how to obtain the access token and channel url
channel_url = <discord channel url>
access_token = <discord access token>

